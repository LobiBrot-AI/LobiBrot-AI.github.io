    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { 
            --bg: #0f0f0f; --sidebar: #171717; --chat-bg: #0f0f0f; --chat-bubble: #1e1e1e; 
            --input: #1e1e1e; --text: #ececec; --accent: #10a37f; --border: #2a2a2a; --danger: #ef4146; 
            --ghost-text: #555; --success: #4ade80;
        }
        [data-theme="light"] { 
            --bg: #f9f9f9; --sidebar: #ffffff; --chat-bg: #f9f9f9; --chat-bubble: #f0f0f0; 
            --input: #ffffff; --text: #1a1a1a; --accent: #10a37f; --border: #e0e0e0; --danger: #d33625;
            --ghost-text: #aaa; --success: #22c55e;
        }
        [data-theme="cyberpunk"] { 
            --bg: #0a0a12; --sidebar: #11111c; --chat-bg: #0a0a12; --chat-bubble: #16162a; 
            --input: #16162a; --text: #00ff9f; --accent: #ff00ff; --border: #ff00ff; --danger: #ffff00;
            --ghost-text: #ff00ff80; --success: #00ffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        #auth-screen { display: flex; align-items: center; justify-content: center; width: 100%; background: var(--bg); flex-direction: column; gap: 20px; }
        .auth-logo { font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .auth-box { background: var(--chat-bubble); padding: 40px; border-radius: 16px; width: 380px; border: 1px solid var(--border); }
        .auth-box h2 { margin-bottom: 20px; text-align:center; font-weight: 600; color: var(--text); }
        .auth-box input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
        .auth-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-bottom: 10px; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }

        #app-screen { display: flex; width: 100%; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: var(--sidebar); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid var(--border); flex-shrink: 0; }
        #sidebar-header { display: flex; gap: 10px; margin-bottom: 20px; }
        #new-chat { flex-grow: 1; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #settings-btn { background: var(--chat-bubble); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; width: 45px; font-size: 18px; }
        
        .sidebar-view { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; }
        #chat-list .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; font-size: 14px; display: flex; justify-content: space-between; color: #b0b0b0; }
        #chat-list .chat-item:hover, #chat-list .chat-item.active { background: var(--chat-bubble); color: var(--text); }
        .del-btn { opacity: 0; color: var(--danger); background: none; border: none; cursor: pointer; font-size: 14px; }
        #chat-list .chat-item:hover .del-btn { opacity: 1; }
        
        .setting-card { background: var(--chat-bubble); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .setting-card label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
        .setting-card select, .setting-card input[type="text"], .setting-card input[type="color"] { width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; margin-bottom: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        .back-btn { background: transparent; border: none; color: var(--accent); cursor: pointer; margin-bottom: 15px; font-weight: 600; font-size: 14px; }

        #user-info { margin-top: auto; font-size: 13px; color: #888; padding-top: 15px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #logout-btn { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 13px; }

        #main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); height: 100vh; overflow: hidden; }
        #header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; flex-shrink: 0; }
        .model-group { display: flex; align-items: center; gap: 5px; background: var(--chat-bubble); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); }
        .model-group label { font-size: 12px; color: #888; margin-right: 5px; }
        select { background: transparent; color: var(--text); border: none; padding: 5px; font-size: 14px; cursor: pointer; }
        select option { background: var(--chat-bubble); color: var(--text); }

        #messages { flex-grow: 1; overflow-y: auto; padding: 40px 20px; }
        .msg-container { max-width: 800px; margin: 0 auto 30px; display: flex; gap: 15px; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; flex-shrink: 0; color: white; }
        .user-avatar { background: #5436DA; }
        .ai-avatar { background: var(--accent); }
        .ai-avatar-2 { background: #ff4400; }
        .msg-content { flex-grow: 1; line-height: 1.6; font-size: 15px; color: var(--text); }
        .msg-content pre { background: #0d0d0d; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border); position: relative; }
        .msg-content code { font-family: 'Fira Code', monospace; font-size: 14px; color: #e0e0e0; }
        .msg-content p > code { background: var(--chat-bubble); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
        .copy-code-btn { position: absolute; top: 8px; right: 8px; background: var(--bg); border: 1px solid var(--border); color: #aaa; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .typing-cursor::after { content: '▋'; animation: blink 1s infinite; color: var(--accent); }
        @keyframes blink { 50% { opacity: 0; } }

        #input-area { padding: 20px; border-top: 1px solid var(--border); position: relative; background: var(--bg); flex-shrink: 0; display: block !important; }
        #prompt-form { max-width: 800px; margin: 0 auto; position: relative; }
        .ghost-wrapper { position: relative; width: 100%; }
        #ghost-prompt { position: absolute; top: 0; left: 0; width: 100%; height: 56px; padding: 15px 60px 15px 15px; border-radius: 12px; border: 1px solid transparent; color: var(--ghost-text); pointer-events: none; font-size: 15px; line-height: 1.5; white-space: pre-wrap; overflow: hidden; z-index: 1; background: transparent; }
        #prompt { position: relative; width: 100%; background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 15px 60px 15px 15px; border-radius: 12px; resize: none; height: 56px; max-height: 200px; font-size: 15px; line-height: 1.5; z-index: 2; }
        #prompt:focus { outline: none; border-color: var(--accent); }
        #send-btn { position: absolute; right: 10px; bottom: 10px; background: var(--accent); border: none; color: white; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; z-index: 3; display: flex; align-items: center; justify-content: center; }
        #send-btn svg { width: 18px; height: 18px; fill: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--sidebar); padding: 30px; border-radius: 16px; width: 400px; border: 1px solid var(--border); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text); }
        .modal-body label { display: block; margin: 15px 0 5px; font-size: 14px; font-weight: 600; }
        .modal-body input[type="text"], .modal-body input[type="color"], .modal-body textarea { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; margin-bottom: 10px; }
        .stats-grid { display: flex; gap: 15px; margin: 20px 0; }
        .stat-card { flex: 1; background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-number { display: block; font-size: 24px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 12px; color: #888; }

        .search-input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; margin-bottom: 10px; font-size: 14px; }

        .icon-btn { background: var(--chat-bubble); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; width: 40px; height: 40px; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .icon-btn:hover { background: var(--accent); color: white; }

        .msg-actions { display: flex; gap: 5px; margin-top: 10px; }
        .action-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .action-btn:hover { color: var(--accent); border-color: var(--accent); }

        .reactions { display: flex; gap: 5px; margin-top: 8px; }
        .reaction-btn { background: var(--chat-bubble); border: 1px solid var(--border); border-radius: 12px; padding: 2px 8px; font-size: 12px; cursor: pointer; }
        .reaction-btn.active { background: var(--accent); color: white; }

        .attachment-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .attachment-item { background: var(--chat-bubble); padding: 5px 10px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .remove-attachment { cursor: pointer; color: var(--danger); }

        .avatar-preview { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
        .avatar-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .avatar-option:hover { transform: scale(1.1); }

        .theme-editor { margin-top: 20px; }
        .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .color-row label { flex: 1; font-size: 13px; }
        .color-row input { width: 80px; }

        @media (max-width: 768px) {
            #sidebar { width: 250px; }
            #header { flex-wrap: wrap; }
            .msg-container { gap: 10px; }
            .msg-avatar { width: 32px; height: 32px; font-size: 14px; }
        }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
        .toast { padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; margin-bottom: 10px; }
        .toast.error { background: var(--danger); }
        .toast.success { background: var(--accent); }
    </style>
</head>

        async function streamApiCall(model, messages, onChunk) {
            try {
                if (model.startsWith('gemini')) return await streamGemini(model, messages, onChunk);
                else if (model.startsWith('deepseek')) return await streamOpenAICompatible(API_ENDPOINTS.deepseek, API_KEYS.deepseek, model, messages, onChunk);
                else return await streamOpenAICompatible(API_ENDPOINTS.zai, API_KEYS.zai, model, messages, onChunk);
            } catch (error) {
                console.error('Stream API Error:', error);
                throw error;
            }
        }

        async function streamOpenAICompatible(url, apiKey, model, messages, onChunk) {
            console.log('Calling API:', url, 'Model:', model);
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${apiKey}` 
                }, 
                body: JSON.stringify({ model, messages, stream: true }) 
            });
            
            if (!res.ok) {
                const errorText = await res.text();
                console.error('API Response:', errorText);
                throw new Error(`HTTP ${res.status}: ${errorText}`);
            }
            
            const reader = res.body.getReader(); 
            const decoder = new TextDecoder();
            let fullText = ''; 
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read(); 
                if (done) break;
                buffer += decoder.decode(value, { stream: true }); 
                const lines = buffer.split('\n'); 
                buffer = lines.pop();
                
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try { 
                            const json = JSON.parse(line.slice(6)); 
                            const c = json.choices[0]?.delta?.content || ''; 
                            if (c) { 
                                fullText += c; 
                                onChunk(fullText); 
                            } 
                        } catch (e) {
                            console.error('Parse error:', e);
                        }
                    }
                }
            } 
            return fullText;
        }

        async function streamGemini(model, messages, onChunk) {
            const contents = messages.map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.content }] }));
            const url = `${API_ENDPOINTS.gemini}/${model}:streamGenerateContent?alt=sse&key=${API_KEYS.gemini}`;
            console.log('Calling Gemini:', url);
            
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ contents }) 
            });
            
            if (!res.ok) {
                const errorText = await res.text();
                console.error('Gemini Response:', errorText);
                throw new Error(`Gemini HTTP ${res.status}: ${errorText}`);
            }
            
            const reader = res.body.getReader(); 
            const decoder = new TextDecoder();
            let fullText = ''; 
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read(); 
                if (done) break;
                buffer += decoder.decode(value, { stream: true }); 
                const lines = buffer.split('\n'); 
                buffer = lines.pop();
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try { 
                            const json = JSON.parse(line.slice(6)); 
                            const t = json.candidates[0]?.content?.parts[0]?.text || ''; 
                            if (t) { 
                                fullText += t; 
                                onChunk(fullText); 
                            } 
                        } catch (e) {
                            console.error('Gemini parse error:', e);
                        }
                    }
                }
            } 
            return fullText;
        }
    </script>
</body>
